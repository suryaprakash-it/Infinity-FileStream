<!DOCTYPE html>
<html>
<head>
    <title>Infinity FileStream</title>

    <style>
        body{
            background:#111827;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#1f2937;
            padding:30px;
            border-radius:12px;
            width:350px;
            text-align:center;
        }

        button{
            width:100%;
            padding:12px;
            font-size:18px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Infinity FileStream</h2>

<h3>{{ file_name }}</h3>

<p>{{ file_size }}</p>

<a href="/download/{{ file_code }}">
    <button>
        ⬇ Download
    </button>
</a>

</div>

</body>
</html>
